name: Build Push and Deploy ECS Services

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: service-1-kk8z8l
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - service-1
          - service-2
          - service-3
          - service-4
          - service-5
          - service-6
          - service-7
          - service-8
          - service-9
          - service-10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            ./services/${{ matrix.service }}

      - name: Tag Docker Image With SHA
        run: |
          docker tag \
            ${{ matrix.service }}:${{ github.sha }} \
            $ECR_REGISTRY/${{ matrix.service }}:${{ github.sha }}

      - name: Push SHA Image
        run: |
          docker push \
            $ECR_REGISTRY/${{ matrix.service }}:${{ github.sha }}

      - name: Tag Latest Image
        run: |
          docker tag \
            ${{ matrix.service }}:${{ github.sha }} \
            $ECR_REGISTRY/${{ matrix.service }}:latest

      - name: Push Latest Image
        run: |
          docker push \
            $ECR_REGISTRY/${{ matrix.service }}:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ${{ matrix.service }}-task \
            --force-new-deployment \
            --region $AWS_REGION